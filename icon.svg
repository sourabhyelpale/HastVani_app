<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Hand: open palm facing forward, fingers spread (ISL greeting gesture) -->
  <!-- Palm base -->
  <rect x="372" y="560" width="280" height="240" rx="60" ry="60" fill="url(#hand)"/>

  <!-- Thumb (left, angled out) -->
  <rect x="280" y="540" width="115" height="70" rx="35" ry="35" fill="url(#hand)" transform="rotate(-30 338 575)"/>

  <!-- Index finger -->
  <rect x="372" y="290" width="68" height="280" rx="34" ry="34" fill="url(#hand)"/>

  <!-- Middle finger (tallest) -->
  <rect x="462" y="250" width="68" height="310" rx="34" ry="34" fill="url(#hand)"/>

  <!-- Ring finger -->
  <rect x="552" y="280" width="68" height="285" rx="34" ry="34" fill="url(#hand)"/>

  <!-- Pinky finger -->
  <rect x="638" y="330" width="56" height="240" rx="28" ry="28" fill="url(#hand)"/>

  <!-- Sound wave arcs (representing "Vaani" / voice) -->
  <path d="M 740 380 Q 800 440 800 512 Q 800 584 740 644" stroke="#ffffff" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 790 340 Q 872 430 872 512 Q 872 594 790 684" stroke="#ffffff" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.45"/>
</svg>
